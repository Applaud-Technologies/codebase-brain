# =============================================================================
# CODEBASE BRAIN - REUSE CANDIDATE RANKING CONFIGURATION
# =============================================================================
# This file defines how candidates are scored for reuse recommendations.

version: "1.0"

# -----------------------------------------------------------------------------
# SCORING WEIGHTS
# -----------------------------------------------------------------------------
# Weights must sum to 1.0

scoring:
  weights:
    semantic_similarity: 0.30    # Vector similarity from Qdrant
    symbol_signature_fit: 0.25   # How well the signature matches requirements
    lexical_match: 0.20          # Zoekt text/name matching
    centrality: 0.15             # How central/used the symbol is (from Neo4j)
    architecture_locality: 0.10  # Same bounded context/layer bonus

  # Minimum scores to be considered a candidate
  thresholds:
    semantic_minimum: 0.5        # Below this, not a semantic match
    combined_minimum: 0.4        # Below this, not shown to agent
    reuse_recommendation: 0.75   # Above this, recommend direct reuse
    extend_recommendation: 0.6   # Above this, recommend extend/wrap

# -----------------------------------------------------------------------------
# PENALTIES
# -----------------------------------------------------------------------------
# Applied as multipliers (0.0-1.0) to the base score

penalties:
  deprecated:
    enabled: true
    multiplier: 0.3              # Deprecated code scores 30% of normal
    detection:
      - attribute: "Obsolete"    # C# [Obsolete]
      - attribute: "Deprecated"  # Various
      - comment_pattern: "@deprecated"
      - comment_pattern: "DEPRECATED"

  test_only:
    enabled: true
    multiplier: 0.2              # Test utilities score 20% when prod code requested
    detection:
      - path_pattern: "**/test/**"
      - path_pattern: "**/tests/**"
      - path_pattern: "**/*.test.*"
      - path_pattern: "**/*.spec.*"
      - namespace_pattern: "*.Tests.*"
      - namespace_pattern: "*.Test.*"

  generated_code:
    enabled: true
    multiplier: 0.4              # Generated code scores 40%
    detection:
      - comment_pattern: "auto-generated"
      - comment_pattern: "Auto-generated"
      - comment_pattern: "<auto-generated>"
      - path_pattern: "**/Generated/**"
      - path_pattern: "**/obj/**"

  orphan_code:
    enabled: true
    multiplier: 0.5              # Code with 0-1 references scores 50%
    threshold: 1                 # fan_in <= this counts as orphan

  old_code:
    enabled: true
    multiplier: 0.7              # Old untouched code scores 70%
    age_days: 365                # Consider "old" if not modified in N days

  wrong_layer:
    enabled: true
    multiplier: 0.6              # Code from forbidden layer scores 60%
    # Uses architecture rules from Neo4j

# -----------------------------------------------------------------------------
# BONUSES
# -----------------------------------------------------------------------------
# Applied as multipliers (>1.0) to boost good matches

bonuses:
  same_namespace:
    enabled: true
    multiplier: 1.2              # Same namespace gets 20% bonus

  same_bounded_context:
    enabled: true
    multiplier: 1.15             # Same bounded context gets 15% bonus

  high_test_coverage:
    enabled: true
    multiplier: 1.1              # Well-tested code gets 10% bonus
    # Requires test coverage integration

  recent_activity:
    enabled: true
    multiplier: 1.1              # Recently modified code gets 10% bonus
    recency_days: 30

  documentation:
    enabled: true
    multiplier: 1.1              # Well-documented code gets 10% bonus
    min_docstring_length: 50

# -----------------------------------------------------------------------------
# RECOMMENDATION LOGIC
# -----------------------------------------------------------------------------

recommendations:
  # Score thresholds for each recommendation type
  thresholds:
    reuse: 0.85                  # Near-perfect match
    extend: 0.70                 # Good match, might need enhancement
    wrap: 0.55                   # Partial match, facade/adapter pattern
    new: 0.0                     # No good match, create new

  # Additional rules
  rules:
    # If exact signature match exists with high usage, always recommend reuse
    - condition: "signature_exact_match AND usage_count > 5"
      recommendation: "reuse"
      override: true

    # If interface exists, recommend implementing it over creating similar
    - condition: "interface_match AND implementation_count < 3"
      recommendation: "extend"
      message: "Consider implementing existing interface"

    # If many similar methods exist, flag for refactoring
    - condition: "similar_method_count > 3"
      recommendation: "needs_review"
      message: "Multiple similar methods exist - consider consolidation"

# -----------------------------------------------------------------------------
# DUPLICATE DETECTION
# -----------------------------------------------------------------------------

duplicate_detection:
  # Thresholds for different duplicate types
  exact_threshold: 0.98          # Normalized code hash match
  near_threshold: 0.85           # AST structure similarity
  semantic_threshold: 0.80       # Embedding similarity

  # What counts as "material" similarity
  material_similarity:
    min_lines: 5                 # Ignore trivial methods
    ignore_patterns:
      - "get/set accessors"
      - "constructor with DI only"
      - "ToString overrides"
      - "equality overrides"

  # How to classify duplicates
  classification:
    exact:
      description: "Identical or near-identical code"
      action: "BLOCK - reuse existing"
    near:
      description: "Same structure, minor differences"
      action: "REVIEW - likely should reuse or refactor"
    semantic:
      description: "Different implementation, same behavior"
      action: "CONSIDER - evaluate if consolidation makes sense"

# -----------------------------------------------------------------------------
# PRE-WRITE GUARD POLICY
# -----------------------------------------------------------------------------

pre_write_guard:
  # What searches must be performed before writing
  required_searches:
    - type: "behavior_search"
      description: "Search for existing behavior"
      min_candidates_reviewed: 3

    - type: "symbol_search"
      description: "Search for similar symbols by name"
      min_candidates_reviewed: 2

    - type: "duplicate_check"
      description: "Check proposed code for duplicates"
      required: true

  # When to block vs warn
  policy:
    block_on:
      - "No searches performed"
      - "Exact duplicate found"
      - "Near duplicate with high usage (>10 references)"

    warn_on:
      - "Semantic duplicate found"
      - "Similar methods exist in same namespace"
      - "Fewer than required candidates reviewed"

    require_justification_for:
      - "Creating new method when reuse recommended"
      - "Creating new class when similar exists"
      - "Adding to namespace with many similar utilities"

  # Audit logging
  audit:
    enabled: true
    log_all_decisions: true
    retention_days: 90
