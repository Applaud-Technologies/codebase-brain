version: "3.9"

services:
  # =============================================================================
  # CORE SEARCH & STORAGE
  # =============================================================================

  zoekt:
    image: sourcegraph/zoekt-webserver:latest
    container_name: codebase-brain-zoekt
    ports:
      - "6070:6070"
    volumes:
      - zoekt-index:/data/index
      - ./config/zoekt:/etc/zoekt:ro
    environment:
      - DATA_DIR=/data/index
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6070/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  zoekt-indexer:
    image: sourcegraph/zoekt-indexserver:latest
    container_name: codebase-brain-zoekt-indexer
    volumes:
      - zoekt-index:/data/index
      - ${REPOS_ROOT:-/home/rscla/repos}:/repos:ro
      - ./config/zoekt:/etc/zoekt:ro
    environment:
      - DATA_DIR=/data/index
      - SRC_ROOT=/repos
    depends_on:
      - zoekt
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codebase-brain-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: codebase-brain-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      # Note: import dir removed - use LOAD CSV from file:// or copy files in
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/codebase-brain-dev}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # ANALYSIS WORKERS
  # =============================================================================

  roslyn-worker:
    build:
      context: ./services/roslyn-worker
      dockerfile: Dockerfile
    container_name: codebase-brain-roslyn
    ports:
      - "5080:8080"
    volumes:
      - ${REPOS_ROOT:-/home/rscla/repos}:/repos:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - REPOS_ROOT=/repos
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codebase-brain-dev}
    depends_on:
      - qdrant
      - neo4j
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  indexer:
    build:
      context: ./services/indexer
      dockerfile: Dockerfile
    container_name: codebase-brain-indexer
    volumes:
      - ${REPOS_ROOT:-/home/rscla/repos}:/repos:ro
    environment:
      - REPOS_ROOT=/repos
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codebase-brain-dev}
      - ZOEKT_URL=http://zoekt:6070
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-minilm}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      - qdrant
      - neo4j
      - zoekt
    restart: unless-stopped

  # =============================================================================
  # MCP GATEWAY (main interface for Claude Code)
  # =============================================================================

  mcp-gateway:
    build:
      context: ./services/mcp-gateway
      dockerfile: Dockerfile
    container_name: codebase-brain-mcp
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - ZOEKT_URL=http://zoekt:6070
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codebase-brain-dev}
      - ROSLYN_URL=http://roslyn-worker:8080
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-minilm}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - zoekt
      - qdrant
      - neo4j
      - roslyn-worker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # OPTIONAL: SEMGREP FOR RULE-BASED CHECKS
  # =============================================================================

  semgrep:
    image: semgrep/semgrep:latest
    container_name: codebase-brain-semgrep
    profiles: ["full"]
    volumes:
      - ${REPOS_ROOT:-/home/rscla/repos}:/repos:ro
      - ./config/semgrep:/rules:ro
    entrypoint: ["tail", "-f", "/dev/null"]  # Keep alive for on-demand scans
    restart: unless-stopped

volumes:
  zoekt-index:
  qdrant-data:
  neo4j-data:
  neo4j-logs:

networks:
  default:
    name: codebase-brain
